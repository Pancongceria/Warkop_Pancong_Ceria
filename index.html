<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Warkop Pancong Ceria</title>
  <meta name="description" content="Warkop Pancong Ceria — pancong hangat lumer dan kopi susu kampung otentik. Dibuat dengan resep rumahan, disajikan dengan senyum.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <style>
    /* =========================================================
       1. DESIGN TOKENS
       ========================================================= */
    :root{
      --mustard:      #E7A335;
      --mustard-dark: #C9832A;
      --cream:        #FFFCF6;
      --sand:         #F6F0E4;
      --charcoal:     #2A211A;
      --charcoal-70:  rgba(42,33,26,.7);
      --charcoal-50:  rgba(42,33,26,.5);
      --clove:        #B5502E;
      --cream-line:   rgba(42,33,26,.1);

      --font-display: 'Baloo 2', system-ui, sans-serif;
      --font-body:    'Plus Jakarta Sans', system-ui, sans-serif;

      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 10px;

      --container: 1180px;
    }

    *,*::before,*::after{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    @media (prefers-reduced-motion: reduce){
      html{ scroll-behavior:auto; }
      *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    }

    body{
      margin:0;
      font-family:var(--font-body);
      color:var(--charcoal);
      background:var(--cream);
      -webkit-font-smoothing:antialiased;
      line-height:1.6;
    }

    img{ max-width:100%; display:block; }
    a{ color:inherit; text-decoration:none; }
    ul{ margin:0; padding:0; list-style:none; }
    section{ position:relative; }

    .wrap{
      max-width:var(--container);
      margin:0 auto;
      padding:0 28px;
    }

    h1,h2,h3,h4{
      font-family:var(--font-display);
      font-weight:700;
      line-height:1.15;
      margin:0;
      letter-spacing:.2px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-family:var(--font-body);
      font-weight:700;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--clove);
      margin-bottom:14px;
    }
    .eyebrow::before{
      content:"";
      width:20px; height:2px;
      background:var(--clove);
      border-radius:2px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:15px 30px;
      border-radius:999px;
      font-family:var(--font-body);
      font-weight:700;
      font-size:15px;
      border:2px solid transparent;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
      white-space:nowrap;
    }
    .btn-primary{
      background:var(--charcoal);
      color:var(--cream);
      box-shadow:0 10px 24px -10px rgba(42,33,26,.5);
    }
    .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 14px 28px -10px rgba(42,33,26,.55); }
    .btn-outline{
      background:transparent;
      border-color:var(--charcoal);
      color:var(--charcoal);
    }
    .btn-outline:hover{ background:var(--charcoal); color:var(--cream); transform:translateY(-2px); }
    .btn-mustard{
      background:var(--mustard);
      color:var(--charcoal);
      box-shadow:0 10px 24px -10px rgba(231,163,53,.7);
    }
    .btn-mustard:hover{ background:var(--mustard-dark); transform:translateY(-2px); }

    /* =========================================================
       2. NAVBAR
       ========================================================= */
    .navbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:100;
      background:rgba(255,252,246,.85);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid transparent;
      transition:background .3s ease, border-color .25s ease, box-shadow .25s ease;
    }
    .navbar.is-scrolled{
      background:rgba(255,252,246,0);
      backdrop-filter:blur(0px);
      -webkit-backdrop-filter:blur(0px);
      border-bottom-color:transparent;
      box-shadow:none;
    }
    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 28px;
      max-width:var(--container);
      margin:0 auto;
      gap:20px;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-family:var(--font-display);
      font-weight:800;
      font-size:20px;
      color:var(--charcoal);
      flex-shrink:0;
    }
    .logo-mark{
      width:38px; height:38px;
      border-radius:50% 50% 50% 6px;
      background:var(--mustard);
      display:flex; align-items:center; justify-content:center;
      font-size:18px;
      flex-shrink:0;
    }
    .nav-links{
      display:flex;
      align-items:center;
      gap:34px;
      margin:0 auto;
    }
    .nav-links a{
      font-weight:600;
      font-size:15px;
      color:var(--charcoal-70);
      position:relative;
      padding:4px 0;
      transition:color .2s ease;
    }
    .nav-links a:hover{ color:var(--charcoal); }
    
    /* Social media di navbar */
    .nav-social{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:10px;
    }
    .nav-social a{
      width:36px;
      height:36px;
      border-radius:50%;
      background:rgba(42,33,26,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--charcoal-70);
      transition:all .2s ease;
    }
    .nav-social a:hover{
      background:var(--mustard);
      color:var(--charcoal);
      transform:translateY(-2px);
    }
    .navbar.is-scrolled .nav-social a{
      color:var(--charcoal);
      background:rgba(255,252,246,.2);
    }
    .navbar.is-scrolled .nav-social a:hover{
      background:var(--mustard);
      color:var(--charcoal);
    }
    
    .nav-actions{ 
      display:flex; 
      align-items:center; 
      gap:18px;
      flex-shrink:0;
    }

    .nav-toggle{
      display:none;
      background:none; border:none; cursor:pointer;
      padding:6px;
      color:var(--charcoal);
    }

    /* Saat navbar transparan */
    .navbar.is-scrolled .nav-links a{
      color:var(--charcoal);
      text-shadow:0 2px 8px rgba(255,252,246,.6);
    }
    .navbar.is-scrolled .nav-links a:hover{
      color:var(--mustard-dark);
    }
    .navbar.is-scrolled .logo{
      color:var(--charcoal);
      text-shadow:0 2px 8px rgba(255,252,246,.6);
    }
    .navbar.is-scrolled .btn-primary{
      background:var(--mustard);
      color:var(--charcoal);
      box-shadow:0 10px 24px -10px rgba(231,163,53,.7);
    }
    .navbar.is-scrolled .btn-primary:hover{
      background:var(--mustard-dark);
    }
    .navbar.is-scrolled .nav-toggle{
      color:var(--charcoal);
    }

    @media (max-width: 860px){
      .nav-social{
        margin:8px 0 4px;
        gap:10px;
        width:100%;
        justify-content:flex-start;
        border-top:1px solid var(--cream-line);
        padding-top:12px;
      }
      .nav-social a{
        width:40px;
        height:40px;
        background:rgba(42,33,26,.06);
      }
      .nav-links.is-open .nav-social{
        display:flex;
      }
      .nav-inner{
        flex-wrap:wrap;
      }
      .nav-links{
        order:3;
        flex-basis:100%;
        flex-direction:column;
        align-items:flex-start;
        gap:0;
        padding:8px 0 20px;
        border-top:1px solid var(--cream-line);
        margin:8px 0 0;
        display:none;
        background:rgba(255,252,246,.95);
        border-radius:0 0 var(--radius-md) var(--radius-md);
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px);
      }
      .nav-links.is-open{
        display:flex;
      }
      .nav-links a{ 
        padding:12px 0; 
        width:100%; 
        border-bottom:1px solid var(--cream-line);
        color:var(--charcoal);
      }
      .nav-links a:hover{ color:var(--mustard-dark); }
      .nav-actions .btn-primary-desktop{ display:none; }
      .nav-toggle{ display:inline-flex; }
      .nav-actions{
        margin-left:auto;
      }
      .navbar.is-scrolled .nav-links{
        background:rgba(255,252,246,.95);
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px);
      }
      .navbar.is-scrolled .nav-links a{
        color:var(--charcoal);
        text-shadow:none;
      }
      .navbar.is-scrolled .nav-links a:hover{
        color:var(--mustard-dark);
      }
      .navbar.is-scrolled .logo{
        color:var(--charcoal);
        text-shadow:none;
      }
      .navbar.is-scrolled .btn-primary{
        background:var(--charcoal);
        color:var(--cream);
        box-shadow:0 10px 24px -10px rgba(42,33,26,.5);
      }
      .navbar.is-scrolled .btn-primary:hover{
        background:var(--charcoal);
      }
    }

    /* =========================================================
       3. HERO
       ========================================================= */
    .hero{
      padding:158px 0 90px;
      position:relative;
      overflow:hidden;
      min-height:100vh;
      display:flex;
      align-items:center;
    }

    .hero-video-bg{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:0;
    }

    .hero-video-bg video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:0.35;
    }

    .hero-video-overlay{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:linear-gradient(135deg, rgba(255,252,246,0.75) 0%, rgba(255,252,246,0.3) 100%);
      z-index:1;
    }

    .hero .wrap{
      position:relative;
      z-index:2;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:0;
      align-items:center;
    }

    .hero-title{
      font-size:clamp(38px, 5vw, 62px);
      color:var(--charcoal);
    }
    .hero-title .accent{ color:var(--mustard-dark); }
    .hero-sub{
      margin:22px 0 34px;
      font-size:18px;
      color:var(--charcoal-70);
      max-width:600px;
    }
    .hero-actions{ display:flex; gap:16px; flex-wrap:wrap; }
    .hero-stats{
      display:flex;
      gap:34px;
      margin-top:44px;
      padding-top:28px;
      border-top:1px solid var(--cream-line);
    }
    .hero-stat b{ font-family:var(--font-display); font-size:24px; display:block; color:var(--charcoal); }
    .hero-stat span{ font-size:13px; color:var(--charcoal-70); }

    @media (max-width: 900px){
      .hero-grid{ grid-template-columns:1fr; }
      .hero-sub{ max-width:none; }
      .hero-stats{ flex-wrap:wrap; row-gap:18px; }
      .hero{
        padding:140px 0 70px;
        min-height:90vh;
      }
    }

    .scallop{
      display:block;
      width:100%;
      height:34px;
      line-height:0;
    }
    .scallop svg{ width:100%; height:100%; display:block; }

    /* =========================================================
       4. SECTION HEADERS
       ========================================================= */
    .section{ padding:96px 0; }
    .section-sand{ background:var(--sand); }
    .section-head{
      max-width:600px;
      margin:0 0 52px;
    }
    .section-head h2{ font-size:clamp(30px,3.6vw, 42px); }
    .section-head p{ margin-top:16px; font-size:17px; color:var(--charcoal-70); }
    .section-head.center{ margin-left:auto; margin-right:auto; text-align:center; }

    .reveal{ opacity:0; transform:translateY(22px); transition:opacity .6s ease, transform .6s ease; }
    .reveal.in-view{ opacity:1; transform:translateY(0); }

    /* =========================================================
       5. MENU GRID
       ========================================================= */
    .menu-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:26px;
    }
    .menu-card{
      background:var(--cream);
      border-radius:var(--radius-lg);
      overflow:hidden;
      border:1px solid var(--cream-line);
      transition:transform .25s ease, box-shadow .25s ease;
      display:flex;
      flex-direction:column;
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .menu-card:hover{
      transform:translateY(-8px);
      box-shadow:0 26px 40px -24px rgba(42,33,26,.35);
    }
    .menu-card-img{
      aspect-ratio:4/3;
      overflow:hidden;
      position:relative;
      background:var(--sand);
    }
    .menu-card-img img{ 
      width:100%; 
      height:100%; 
      object-fit:cover; 
      transition:transform .5s ease;
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }
    .menu-card:hover .menu-card-img img{ 
      transform:scale(1.06) translateZ(0);
      -webkit-transform:scale(1.06) translateZ(0);
    }
    .menu-card-price{
      position:absolute;
      top:14px; right:14px;
      background:var(--mustard);
      color:var(--charcoal);
      font-family:var(--font-display);
      font-weight:700;
      font-size:14px;
      padding:6px 14px;
      border-radius:999px;
      box-shadow:0 8px 16px -6px rgba(42,33,26,.35);
      z-index:2;
    }
    .menu-card-body{ padding:22px 22px 24px; flex:1; display:flex; flex-direction:column; }
    .menu-card-body h3{ font-size:19px; margin-bottom:8px; }
    .menu-card-body p{ font-size:14.5px; color:var(--charcoal-70); flex:1; margin:0 0 16px; }
    .menu-card-cta{
      font-size:13.5px;
      font-weight:700;
      color:var(--clove);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    /* =========================================================
       5.5. MENU LAINNYA
       ========================================================= */
    .menu-extended{
      margin-top:56px;
      background:var(--cream);
      border-radius:var(--radius-lg);
      border:1px solid var(--cream-line);
      padding:32px 36px;
      box-shadow:0 16px 32px -18px rgba(42,33,26,.15);
    }
    .menu-extended-title{
      font-family:var(--font-display);
      font-size:24px;
      font-weight:700;
      margin-bottom:24px;
      padding-bottom:16px;
      border-bottom:1px solid var(--cream-line);
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--charcoal);
    }
    .menu-list{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      column-gap: 36px;
      row-gap: 0;
    }
    .menu-list-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
      border-bottom:1px dashed var(--cream-line);
      font-size:15px;
      min-height: 52px;
    }
    .menu-list-item:last-child,
    .menu-list-item:nth-last-child(2):nth-child(even) {
      border-bottom:none;
    }
    .menu-item-name{
      font-weight:600;
      color:var(--charcoal);
      display:flex;
      align-items:center;
      gap:6px;
      flex: 1;
      padding-right: 12px;
    }
    .menu-item-desc{
      font-size:13.5px;
      color:var(--charcoal-70);
      margin-left:4px;
      font-weight:400;
    }
    .menu-item-price{
      font-family:var(--font-display);
      font-weight:700;
      color:var(--clove);
      font-size:16px;
      white-space:nowrap;
      margin-left:12px;
      flex-shrink: 0;
    }

    @media (max-width: 700px){
      .menu-list{
        grid-template-columns:1fr;
        row-gap: 0;
      }
      .menu-list-item {
        padding: 13px 0;
        min-height: 48px;
      }
      .menu-list-item:last-child {
        border-bottom: none;
      }
      .menu-list-item:nth-last-child(2):nth-child(even) {
        border-bottom: 1px dashed var(--cream-line);
      }
      .menu-extended{
        padding:24px 22px;
      }
      .menu-item-name {
        font-size: 14.5px;
      }
      .menu-item-desc {
        font-size: 13px;
      }
      .menu-item-price {
        font-size: 15px;
      }
    }

    @media (max-width: 900px){
      .menu-grid{
        grid-template-columns:repeat(2, 1fr);
        gap:20px;
      }
    }
    @media (max-width: 520px){
      .menu-grid{
        grid-template-columns:1fr;
      }
    }

    /* =========================================================
       6. TENTANG KAMI
       ========================================================= */
    .about-grid{
      display:grid;
      grid-template-columns:.85fr 1.15fr;
      gap:64px;
      align-items:center;
    }

    .about-gallery-wrapper{
      position:relative;
      border-radius:var(--radius-lg);
      overflow:hidden;
      box-shadow:0 30px 55px -28px rgba(42,33,26,.4);
      background:var(--sand);
    }

    .about-gallery-scroll{
      display:flex;
      gap:0;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      scroll-behavior:smooth;
      aspect-ratio:4/4.6;
      cursor:grab;
      scrollbar-width:thin;
      scrollbar-color:var(--mustard) var(--sand);
    }

    .about-gallery-scroll::-webkit-scrollbar{
      height:6px;
    }

    .about-gallery-scroll::-webkit-scrollbar-track{
      background:var(--sand);
      border-radius:10px;
    }

    .about-gallery-scroll::-webkit-scrollbar-thumb{
      background:var(--mustard);
      border-radius:10px;
    }

    .about-gallery-scroll::-webkit-scrollbar-thumb:hover{
      background:var(--mustard-dark);
    }

    .about-gallery-slide{
      flex:0 0 100%;
      width:100%;
      height:100%;
      scroll-snap-align:start;
      position:relative;
    }

    .about-gallery-slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .gallery-dots{
      position:absolute;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:5;
      background:rgba(42,33,26,.5);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      padding:8px 14px;
      border-radius:999px;
    }

    .gallery-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,252,246,.4);
      border:2px solid transparent;
      cursor:pointer;
      transition:all .3s ease;
      flex-shrink:0;
      padding:0;
    }

    .gallery-dot.active{
      background:var(--mustard);
      border-color:var(--cream);
      transform:scale(1.15);
    }

    .gallery-dot:hover{
      background:var(--mustard-dark);
      transform:scale(1.1);
    }

    .gallery-nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:5;
      background:rgba(42,33,26,.6);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      border:none;
      border-radius:50%;
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--cream);
      cursor:pointer;
      transition:all .25s ease;
      padding:0;
    }

    .gallery-nav:hover{
      background:var(--mustard);
      transform:translateY(-50%) scale(1.05);
    }

    .gallery-nav.prev{
      left:12px;
    }

    .gallery-nav.next{
      right:12px;
    }

    .gallery-nav svg{
      width:20px;
      height:20px;
    }

    .about-text .section-head{ margin-bottom:24px; }
    .about-text p{ color:var(--charcoal-70); font-size:16.5px; margin:0 0 18px; }
    .about-points{ display:flex; flex-direction:column; gap:16px; margin-top:28px; }
    .about-point{ display:flex; gap:14px; align-items:flex-start; }
    .about-point .ico{
      width:38px; height:38px; flex-shrink:0;
      border-radius:50%;
      background:var(--mustard);
      display:flex; align-items:center; justify-content:center;
      color:var(--charcoal);
    }
    .about-point b{ display:block; font-size:15.5px; margin-bottom:2px; }
    .about-point span{ font-size:14px; color:var(--charcoal-70); }

    @media (max-width: 900px){
      .about-grid{ 
        grid-template-columns:1fr; 
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      .about-gallery-wrapper{
        max-width:100%;
        width:100%;
        margin:0 0 8px 0;
        order:1;
        border-radius:var(--radius-lg);
        overflow:hidden;
        box-shadow:0 30px 55px -28px rgba(42,33,26,.4);
      }
      .about-gallery-scroll{
        aspect-ratio:4/3;
      }
      .about-text{
        order:0;
        width:100%;
      }
      .about-text .section-head{
        margin-bottom:20px;
      }
      .about-text .section-head h2{
        font-size:clamp(28px,5vw,38px);
      }
      .about-text p{
        font-size:16px;
      }
      .gallery-nav{
